<!-- Floating Chatbot Component -->
<div id="chatbot-container" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
    
    <!-- Chat Window (Hidden by Default) -->
    <div id="chatbot-window" class="hidden flex flex-col w-80 sm:w-96 h-[500px] bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-slate-200 mb-4 overflow-hidden transition-all duration-300 origin-bottom-right transform scale-95 opacity-0">
        <!-- Header -->
        <div class="bg-gradient-to-r from-primary to-blue-700 p-4 text-white flex justify-between items-center shadow-md z-10">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm">
                    <span class="material-symbols-outlined text-sm">smart_toy</span>
                </div>
                <div>
                    <h3 class="font-bold text-sm leading-tight">L&D Assistant</h3>
                    <p class="text-[10px] text-blue-100 font-medium">Online | Ready to help</p>
                </div>
            </div>
            <button onclick="toggleChatbot()" class="p-1.5 hover:bg-white/20 rounded-lg transition-colors flex items-center justify-center">
                <span class="material-symbols-outlined text-sm">close</span>
            </button>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 bg-slate-50 p-4 overflow-y-auto flex flex-col gap-4">
            <!-- Automated Welcome Message -->
            <div class="flex items-start gap-2 max-w-[85%]">
                <div class="w-6 h-6 rounded-full bg-gradient-to-r from-primary to-blue-600 flex items-center justify-center shrink-0 mt-1">
                    <span class="material-symbols-outlined text-white text-[12px]">smart_toy</span>
                </div>
                <div class="bg-white border border-slate-200 text-slate-700 px-3 py-2.5 rounded-2xl rounded-tl-sm text-sm shadow-sm">
                    Hello! I am your AI Analytics Assistant. You can ask me questions about training coverage, departmental gaps, or specific employee metadata. How can I help you today?
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-white p-3 border-t border-slate-100">
            <form class="flex items-center gap-2 bg-slate-100 rounded-xl px-2 py-1 focus-within:ring-2 focus-within:ring-primary/20 transition-all border border-transparent focus-within:border-primary/20" onsubmit="event.preventDefault(); submitChat();">
                <input type="text" id="chatInput" placeholder="Ask a question..." class="flex-1 bg-transparent border-none text-sm px-2 py-2 focus:ring-0 text-slate-700 placeholder-slate-400">
                <button type="submit" class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center hover:bg-blue-800 transition-colors shrink-0 shadow-sm">
                    <span class="material-symbols-outlined text-[16px] ml-0.5 mt-0.5">send</span>
                </button>
            </form>
            <div class="text-center mt-2">
                <p class="text-[9px] text-slate-400 font-medium">AI can make mistakes. Verify critical data.</p>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button id="chatbot-fab" onclick="toggleChatbot()" class="w-14 h-14 bg-gradient-to-r from-primary to-blue-600 text-white rounded-full shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all flex items-center justify-center flex-shrink-0 relative group">
        <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">chat</span>
        <!-- Notification Dot -->
        <span class="absolute top-0 right-0 w-3.5 h-3.5 bg-red-500 border-2 border-white rounded-full"></span>
    </button>
</div>

<!-- Insight Modal -->
<div id="insight-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/50 backdrop-blur-sm transition-opacity duration-300 opacity-0">
    <div class="bg-white rounded-2xl shadow-2xl w-[90%] max-w-lg overflow-hidden transform scale-95 transition-transform duration-300">
        <!-- Header -->
        <div class="bg-gradient-to-r from-primary to-blue-700 p-4 text-white flex justify-between items-center shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm">
                    <span class="material-symbols-outlined text-sm">insights</span>
                </div>
                <h3 class="font-bold text-sm leading-tight">AI Insight</h3>
            </div>
            <button onclick="closeInsightModal()" class="p-1.5 hover:bg-white/20 rounded-lg transition-colors flex items-center justify-center">
                <span class="material-symbols-outlined text-sm">close</span>
            </button>
        </div>
        <!-- Body -->
        <div id="insight-modal-body" class="p-6 max-h-[60vh] overflow-y-auto prose prose-sm prose-slate max-w-none text-slate-700 leading-snug prose-li:my-0.5 prose-p:my-1 prose-strong:text-blue-900">
        </div>
    </div>
</div>

<script>
    function openInsightModal() {
        const modal = document.getElementById('insight-modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modal.classList.add('opacity-100');
            modal.firstElementChild.classList.remove('scale-95');
            modal.firstElementChild.classList.add('scale-100');
        }, 10);
    }

    function closeInsightModal() {
        const modal = document.getElementById('insight-modal');
        modal.classList.remove('opacity-100');
        modal.classList.add('opacity-0');
        modal.firstElementChild.classList.remove('scale-100');
        modal.firstElementChild.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }, 300);
    }

    function openChatbotIfClosed() {
        const windowEl = document.getElementById('chatbot-window');
        if (!windowEl) return;
        if (windowEl.classList.contains('hidden')) {
            toggleChatbot();
        }
    }

    function appendBotMessage(rawText) {
        const chatArea = document.querySelector('#chatbot-window .overflow-y-auto');
        if (!chatArea) return;

        let formattedText = rawText || '';
        if (typeof marked !== 'undefined') {
            formattedText = marked.parse(formattedText);
        } else {
            formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formattedText = formattedText.replace(/\n\n/g, '<br><br>');
            formattedText = formattedText.replace(/\n/g, '<br>');
        }

        const aiMsg = document.createElement('div');
        aiMsg.className = 'flex items-start gap-2 max-w-[95%]';
        aiMsg.innerHTML = `
            <div class="w-6 h-6 rounded-full bg-gradient-to-r from-primary to-blue-600 flex items-center justify-center shrink-0 mt-1">
                <span class="material-symbols-outlined text-white text-[12px]">smart_toy</span>
            </div>
            <div class="bg-white border border-slate-200 text-slate-700 px-3 py-2.5 rounded-2xl rounded-tl-sm text-sm shadow-sm">
                <div class="prose prose-sm prose-slate max-w-none text-slate-700 leading-snug prose-li:my-0.5 prose-p:my-1 prose-strong:text-blue-900">${formattedText}</div>
            </div>
        `;
        chatArea.appendChild(aiMsg);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function appendTypingIndicator() {
        const chatArea = document.querySelector('#chatbot-window .overflow-y-auto');
        if (!chatArea) return null;
        const el = document.createElement('div');
        el.className = 'flex items-start gap-2 max-w-[85%]';
        el.innerHTML = `
            <div class="w-6 h-6 rounded-full bg-gradient-to-r from-primary to-blue-600 flex items-center justify-center shrink-0 mt-1">
                <span class="material-symbols-outlined text-white text-[12px]">smart_toy</span>
            </div>
            <div class="bg-white border border-slate-200 text-slate-700 px-3 py-2.5 rounded-2xl rounded-tl-sm text-sm shadow-sm flex items-center gap-1">
                <span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span>
                <span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
                <span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
            </div>
        `;
        chatArea.appendChild(el);
        chatArea.scrollTop = chatArea.scrollHeight;
        return el;
    }

    async function generateInsight(context) {
        openInsightModal();
        const bodyEl = document.getElementById('insight-modal-body');
        bodyEl.innerHTML = `
            <div class="flex flex-col items-center justify-center py-8">
                <div class="flex items-center gap-1 mb-3">
                    <span class="inline-block w-2.5 h-2.5 bg-primary rounded-full animate-bounce"></span>
                    <span class="inline-block w-2.5 h-2.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
                    <span class="inline-block w-2.5 h-2.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                </div>
                <p class="text-sm text-slate-500 font-medium animate-pulse">Analyzing data & generating insight...</p>
            </div>
        `;

        try {
            const response = await fetch('/api/insight', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ context: context || {} })
            });
            const data = await response.json();
            
            let rawText = data.insight || 'No insight available.';
            let formattedText = rawText;
            if (typeof marked !== 'undefined') {
                formattedText = marked.parse(rawText);
            } else {
                formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                formattedText = formattedText.replace(/\n\n/g, '<br><br>');
                formattedText = formattedText.replace(/\n/g, '<br>');
            }
            bodyEl.innerHTML = formattedText;
        } catch (e) {
            bodyEl.innerHTML = `
                <div class="flex items-start gap-2 bg-red-50 p-4 border border-red-200 rounded-xl">
                    <span class="material-symbols-outlined text-red-500 text-lg">error</span>
                    <p class="text-sm text-red-700">Could not generate insight. Please ensure the backend is running.</p>
                </div>
            `;
            console.error('Insight error:', e);
        }
    }

    function collectInsightContext() {
        const el = document.getElementById('insight-context');
        if (!el) return {};
        try {
            return JSON.parse(el.textContent || '{}');
        } catch {
            return {};
        }
    }

    function wireGenerateInsightButtons() {
        document.querySelectorAll('[data-generate-insight="true"]').forEach(btn => {
            if (btn.dataset.wired === '1') return;
            btn.dataset.wired = '1';
            btn.addEventListener('click', () => generateInsight(collectInsightContext()));
        });
    }

    function toggleChatbot() {
        const windowEl = document.getElementById('chatbot-window');
        const isHidden = windowEl.classList.contains('hidden');
        
        if (isHidden) {
            // Open animation
            windowEl.classList.remove('hidden');
            setTimeout(() => {
                windowEl.classList.remove('scale-95', 'opacity-0');
                windowEl.classList.add('scale-100', 'opacity-100');
            }, 10);
            
            // Hide notification dot
            const notificationDot = document.querySelector('#chatbot-fab .bg-red-500');
            if (notificationDot) notificationDot.style.display = 'none';
        } else {
            // Close animation
            windowEl.classList.remove('scale-100', 'opacity-100');
            windowEl.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                windowEl.classList.add('hidden');
            }, 300); // Wait for transition
        }
    }

    async function submitChat() {
        const inputEl = document.getElementById('chatInput');
        const inputStr = inputEl.value;
        if (!inputStr.trim()) return;

        const chatArea = document.querySelector('#chatbot-window .overflow-y-auto');
        
        // Append user message
        const userMsg = document.createElement('div');
        userMsg.className = 'flex items-start justify-end gap-2 max-w-[85%] self-end w-full';
        userMsg.innerHTML = `
            <div class="bg-primary text-white px-3 py-2.5 rounded-2xl rounded-tr-sm text-sm shadow-sm order-1 ml-auto text-right">
                ${inputStr}
            </div>
            <div class="w-6 h-6 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center shrink-0 mt-1 order-2">
                <span class="material-symbols-outlined text-slate-500 text-[12px]">person</span>
            </div>
        `;
        chatArea.appendChild(userMsg);
        inputEl.value = '';
        chatArea.scrollTop = chatArea.scrollHeight;
        
        // Simulate typing delay & response
        const aiTypingIndicator = document.createElement('div');
        aiTypingIndicator.className = 'flex items-start gap-2 max-w-[85%]';
        aiTypingIndicator.innerHTML = `
            <div class="w-6 h-6 rounded-full bg-gradient-to-r from-primary to-blue-600 flex items-center justify-center shrink-0 mt-1">
                <span class="material-symbols-outlined text-white text-[12px]">smart_toy</span>
            </div>
            <div class="bg-white border border-slate-200 text-slate-700 px-3 py-2.5 rounded-2xl rounded-tl-sm text-sm shadow-sm flex items-center gap-1">
                <span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span>
                <span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
                <span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
            </div>
        `;
        chatArea.appendChild(aiTypingIndicator);
        chatArea.scrollTop = chatArea.scrollHeight;
        
        try {
            // Asynchronous Fetch mapping directly to secure Pandas computation
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: inputStr })
            });

            const data = await response.json();
            
            // Remove typing indicator visually
            chatArea.removeChild(aiTypingIndicator);
            
            // Generate standard AI bubble dynamically tracking outputs
            // Generate standard AI bubble dynamically tracking outputs
            const rawText = data.final_response || "Here are the results";
            let formattedText = rawText;
            if (typeof marked !== 'undefined') {
                formattedText = marked.parse(rawText);
            } else {
                // Fallback parser if CDN fails
                formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                formattedText = formattedText.replace(/\n\n/g, '<br><br>');
                formattedText = formattedText.replace(/\n/g, '<br>');
            }
            let textHtml = `<div class="mb-3 prose prose-sm prose-slate max-w-none text-slate-700 leading-snug prose-li:my-0.5 prose-p:my-1 prose-strong:text-blue-900">${formattedText}</div>`;
            
            // Layout isolated metric tables locally within HTML string natively 
            if (data.data_result && data.data_result.length > 0) {
                // If it is just an error response layout inside red text block
                if (data.data_result[0].error) {
                     textHtml += `<div class="text-xs text-red-600 bg-red-50 p-2 rounded">${data.data_result[0].error}</div>`;
                } else {
                     textHtml += `<div class="overflow-x-auto rounded border border-slate-200 mt-2">
                                     <table class="w-full text-left text-xs">
                                         <thead class="bg-slate-100 text-slate-600 uppercase">
                                             <tr>`;
                     const columns = Object.keys(data.data_result[0]);
                     columns.forEach(col => {
                         textHtml += `<th class="px-2 py-1 font-semibold border-b">${col}</th>`;
                     });
                     textHtml += `</tr></thead><tbody class="divide-y divide-slate-100">`;
                     
                     data.data_result.forEach(row => {
                         textHtml += `<tr>`;
                         columns.forEach(col => {
                             let cellVal = row[col];
                             // Format floats appropriately isolating huge decimals mapping cleanly
                             if (typeof cellVal === 'number' && !Number.isInteger(cellVal)) { cellVal = cellVal.toFixed(2); }
                             textHtml += `<td class="px-2 py-1 whitespace-nowrap">${cellVal}</td>`;
                         });
                         textHtml += `</tr>`;
                     });
                     textHtml += `</tbody></table></div>`;
                }
            } else if (data.data_result && data.data_result.length === 0) {
                 textHtml += `<div class="text-xs italic text-slate-400">No matching records found.</div>`;
            }

            const aiMsg = document.createElement('div');
            aiMsg.className = 'flex items-start gap-2 max-w-[95%]';
            aiMsg.innerHTML = `
                <div class="w-6 h-6 rounded-full bg-gradient-to-r from-primary to-blue-600 flex items-center justify-center shrink-0 mt-1">
                    <span class="material-symbols-outlined text-white text-[12px]">smart_toy</span>
                </div>
                <div class="bg-white border border-slate-200 text-slate-700 px-3 py-2.5 rounded-2xl rounded-tl-sm text-sm shadow-sm">
                    ${textHtml}
                </div>
            `;
            chatArea.appendChild(aiMsg);
            
        } catch (error) {
            // Error handling isolated from native query parsing
            chatArea.removeChild(aiTypingIndicator);
            
            const errMsg = document.createElement('div');
            errMsg.className = 'flex items-start gap-2 max-w-[85%]';
            errMsg.innerHTML = `
                <div class="w-6 h-6 rounded-full bg-red-500 flex items-center justify-center shrink-0 mt-1">
                    <span class="material-symbols-outlined text-white text-[12px]">error</span>
                </div>
                <div class="bg-red-50 border border-red-200 text-red-700 px-3 py-2.5 rounded-2xl rounded-tl-sm text-sm shadow-sm">
                    Network error communicating to query engine. Is the backend correctly running?
                </div>
            `;
            chatArea.appendChild(errMsg);
            console.error("Chat error:", error);
        }
        
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Auto-wire on load
    document.addEventListener('DOMContentLoaded', wireGenerateInsightButtons);
</script>
